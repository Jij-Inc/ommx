[tool.uv.sources]
ommx = { workspace = true }
ommx_highs_adapter = { workspace = true }

# JijModeling 2.4.1 is used in the Experiment tutorial only for its
# Problem protobuf codec. Its published metadata still caps OMMX at <3,
# so relax that transitive bound for this workspace's dev lock.
[[tool.uv.dependency-metadata]]
name = "jijmodeling"
version = "2.4.1"
requires-python = ">=3.11,<4"
requires-dist = [
  "numpy",
  "ommx>=2.0.0,<4.0.0",
  "orjson>=3.8.0,<4.0.0",
  "pandas",
  "typing-extensions",
]

[tool.uv.workspace]
members = ["python/ommx*"]

[dependency-groups]
docs = [
  "myst-nb>=1.0.0",
  "sphinx>=7.4.7",
  "sphinx-autoapi>=3.5.0",
  "sphinx-book-theme>=1.1.4",
  "sphinx-fontawesome>=0.0.6",
  "sphinxcontrib-katex>=0.9.11",
  "tomlkit>=0.13.2",
]
dev = [
  { include-group = "docs" },
  "ipython>=8.18.1",
  "jijmodeling>=2.4.1,<3.0.0; python_version >= '3.11'",
  "jupyter>=1.1.1",
  "jupyterlab>=4.3.5",
  "jupytext>=1.19.3",
  "markdown-code-runner>=2.1.0",
  "matplotlib>=3.10.7",
  "nbqa>=1.9.1",
  "nbval>=0.11.0",
  "networkx>=3.2.1",
  "opentelemetry-sdk>=1.20.0",
  "pluggy",
  "pyright>=1.1.394",
  "pytest-codspeed>=4.5.0",
  "pytest-github-actions-annotate-failures",
  "pytest>=8.3.4",
  "pyyaml>=6.0.3",
  "ruamel-yaml>=0.18.10",
  "ruff>=0.9.6",
  "syrupy>=4.7.2",
]
