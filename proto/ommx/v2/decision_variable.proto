syntax = "proto3";

package ommx.v2;

import "ommx/v1/decision_variables.proto";
import "ommx/v1/sample_set.proto";
import "ommx/v2/common.proto";

// Definition-stage decision-variable row.
//
// The enclosing DecisionVariableTable owns VariableID and modeling labels.
message DecisionVariable {
  ommx.v1.DecisionVariable.Kind kind = 1;
  // Required for interval-domain kinds and absent for KIND_FINITE_DOMAIN.
  ommx.v1.Bound bound = 2;
  // Required for KIND_FINITE_DOMAIN and absent for interval-domain kinds.
  ommx.v1.FiniteDomain finite_domain = 3;
}

// Evaluated-stage decision-variable row.
message EvaluatedDecisionVariable {
  ommx.v1.DecisionVariable.Kind kind = 1;
  // Required for interval-domain kinds and absent for KIND_FINITE_DOMAIN.
  ommx.v1.Bound bound = 2;
  double value = 3;
  // Required for KIND_FINITE_DOMAIN and absent for interval-domain kinds.
  ommx.v1.FiniteDomain finite_domain = 4;
}

// Sampled-stage decision-variable row.
message SampledDecisionVariable {
  ommx.v1.DecisionVariable.Kind kind = 1;
  // Required for interval-domain kinds and absent for KIND_FINITE_DOMAIN.
  ommx.v1.Bound bound = 2;
  ommx.v1.SampledValues samples = 3;
  // Required for KIND_FINITE_DOMAIN and absent for interval-domain kinds.
  ommx.v1.FiniteDomain finite_domain = 4;
}

// Definition-stage decision-variable table.
//
// Map keys own VariableID. `labels` and `fixed_values` must only reference
// IDs present in `entries`.
message DecisionVariableTable {
  map<uint64, DecisionVariable> entries = 1;
  map<uint64, ModelingLabel> labels = 2;
  map<uint64, double> fixed_values = 3;
}

// Evaluated-stage decision-variable table.
message EvaluatedDecisionVariableTable {
  map<uint64, EvaluatedDecisionVariable> entries = 1;
  map<uint64, ModelingLabel> labels = 2;
}

// Sampled-stage decision-variable table.
message SampledDecisionVariableTable {
  map<uint64, SampledDecisionVariable> entries = 1;
  map<uint64, ModelingLabel> labels = 2;
}
