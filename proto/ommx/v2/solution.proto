syntax = "proto3";

package ommx.v2;

import "ommx/v1/instance.proto";
import "ommx/v1/solution.proto";
import "ommx/v2/common.proto";
import "ommx/v2/constraint.proto";
import "ommx/v2/decision_variable.proto";
import "ommx/v2/named_function.proto";

// Validated single-state solver output serialization root.
message Solution {
  repeated Feature required_features = 1;
  double objective = 2;
  EvaluatedDecisionVariableTable decision_variables = 3;
  EvaluatedRegularConstraintCollection evaluated_regular_constraints = 4;
  bool feasible = 5;
  ommx.v1.Optimality optimality = 6;
  ommx.v1.Relaxation relaxation = 7;
  optional bool feasible_relaxed = 8;
  ommx.v1.Instance.Sense sense = 9;
  EvaluatedNamedFunctionTable evaluated_named_functions = 10;
  ommx.v1.ProcessMetadata metadata = 11;
  map<string, string> annotations = 12;
  EvaluatedIndicatorConstraintCollection evaluated_indicator_constraints = 13;
  EvaluatedOneHotConstraintCollection evaluated_one_hot_constraints = 14;
  EvaluatedSos1ConstraintCollection evaluated_sos1_constraints = 15;
  // Absolute tolerance used to compute and validate `feasible`,
  // `feasible_relaxed`, and per-constraint feasibility columns.
  optional double feasibility_atol = 16;
}
