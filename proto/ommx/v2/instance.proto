syntax = "proto3";

package ommx.v2;

import "ommx/v1/function.proto";
import "ommx/v1/instance.proto";
import "ommx/v2/common.proto";
import "ommx/v2/constraint.proto";
import "ommx/v2/decision_variable.proto";
import "ommx/v2/named_function.proto";

// Validated optimization problem serialization root.
message Instance {
  repeated Feature required_features = 1;
  ommx.v1.Instance.Description description = 2;
  DecisionVariableTable decision_variables = 3;
  ommx.v1.Function objective = 4;
  RegularConstraintCollection regular_constraints = 5;
  ommx.v1.Instance.Sense sense = 6;
  ommx.v1.Parameters parameters = 7;
  IndicatorConstraintCollection indicator_constraints = 8;
  OneHotConstraintCollection one_hot_constraints = 9;
  Sos1ConstraintCollection sos1_constraints = 10;
  map<uint64, ommx.v1.Function> decision_variable_dependency = 11;
  NamedFunctionTable named_functions = 12;
  map<string, string> annotations = 13;
}
