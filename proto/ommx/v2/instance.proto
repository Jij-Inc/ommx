syntax = "proto3";

package ommx.v2;

import "ommx/v1/function.proto";
import "ommx/v1/instance.proto";
import "ommx/v2/common.proto";
import "ommx/v2/constraint.proto";
import "ommx/v2/decision_variable.proto";
import "ommx/v2/named_function.proto";
import "ommx/v2/parameter.proto";

// Validated optimization problem serialization root.
message Instance {
  ModelDescription description = 1;
  DecisionVariableTable decision_variables = 2;
  ommx.v1.Function objective = 3;
  RegularConstraintCollection regular_constraints = 4;
  ommx.v1.Instance.Sense sense = 5;
  ParameterValues parameters = 6;
  IndicatorConstraintCollection indicator_constraints = 7;
  OneHotConstraintCollection one_hot_constraints = 8;
  Sos1ConstraintCollection sos1_constraints = 9;
  map<uint64, ommx.v1.Function> decision_variable_dependency = 10;
  NamedFunctionTable named_functions = 11;
  map<string, string> annotations = 12;
}
