syntax = "proto3";

package ommx.v2;

import "ommx/v1/instance.proto";
import "ommx/v1/sample_set.proto";
import "ommx/v1/solution.proto";
import "ommx/v2/common.proto";
import "ommx/v2/constraint.proto";
import "ommx/v2/decision_variable.proto";
import "ommx/v2/named_function.proto";

// Validated multi-sample solver or sampler output serialization root.
message SampleSet {
  repeated Feature required_features = 1;
  ommx.v1.SampledValues objectives = 2;
  SampledDecisionVariableTable decision_variables = 3;
  SampledRegularConstraintCollection sampled_regular_constraints = 4;
  map<uint64, bool> feasible = 5;
  ommx.v1.Instance.Sense sense = 6;
  map<uint64, bool> feasible_relaxed = 7;
  SampledNamedFunctionTable sampled_named_functions = 8;
  ommx.v1.ProcessMetadata metadata = 9;
  map<string, string> annotations = 10;
  SampledIndicatorConstraintCollection sampled_indicator_constraints = 11;
  SampledOneHotConstraintCollection sampled_one_hot_constraints = 12;
  SampledSos1ConstraintCollection sampled_sos1_constraints = 13;
  // Absolute tolerance used to compute and validate `feasible`,
  // `feasible_relaxed`, and per-constraint feasibility columns.
  optional double feasibility_atol = 14;
}
