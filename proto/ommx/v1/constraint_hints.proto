syntax = "proto3";

package ommx.v1;

import "ommx/v1/one_hot.proto";
import "ommx/v1/sos1.proto";

// Constraint hints are advisory information derived from one or more regular constraints
// and may be used by a solver to improve performance. Readers may ignore them. They do not
// replace the referenced constraints or certify mathematical equivalence to a special constraint.
message ConstraintHints {
  // One-hot constraint: e.g. `x_1 + ... + x_n = 1` for binary variables `x_1, ..., x_n`.
  repeated OneHot one_hot_constraints = 2;
  // SOS1 constraint: at most one of x_1, ..., x_n can be non-zero.
  repeated SOS1 sos1_constraints = 3;
}
