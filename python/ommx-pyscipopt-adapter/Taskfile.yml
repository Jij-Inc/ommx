# https://taskfile.dev
# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: "3"

tasks:
  default:
    cmds:
      - task: test

  test:
    desc: Run all tests for OMMX PySCIPOpt Adapter
    cmds:
      - task: pytest
      - task: pyright
      - task: markdown-code-runner
      - task: lint

  pytest:
    desc: Run pytest tests (unit only, excluding benchmark tests)
    cmds:
      - uv run pytest -vv --doctest-modules --ignore-glob=tests/test_bench_*.py

  pytest-bench:
    desc: Run benchmark tests without codspeed measurement
    cmds:
      - uv run pytest -vv tests/test_bench_*.py

  bench:
    desc: Run benchmarks under pytest-codspeed
    cmds:
      - uv run pytest tests/test_bench_*.py --codspeed

  pyright:
    desc: Run pyright type checking
    cmds:
      - uv run pyright

  markdown-code-runner:
    desc: Run markdown code runner
    cmds:
      - uv run markdown-code-runner --verbose README.md

  lint:
    desc: Lint by ruff check
    cmds:
      - uv run ruff check
