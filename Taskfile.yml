# https://taskfile.dev
# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: "3"

includes:
  lean:
    taskfile: lean/Taskfile.yml
    dir: lean
  book_ja:
    taskfile: docs/ja/Taskfile.yml
    dir: docs/ja
  book_en:
    taskfile: docs/en/Taskfile.yml
    dir: docs/en
  python:
    taskfile: python/Taskfile.yml
    dir: python
  rust:
    taskfile: rust/Taskfile.yml
    dir: rust
  proto:
    taskfile: proto/Taskfile.yml
    dir: proto

tasks:
  codspeed:trigger:
    desc: Trigger the full CodSpeed suite on the current branch
    cmds:
      - gh workflow run bench.yml --ref $(git branch --show-current) --field suite=full

  codspeed:list:
    desc: List all Codspeed workflows
    cmds:
      - gh run list --workflow=bench.yml

  pyo3-bridge:check:
    desc: Check generated PyO3 bridge stubs and fixture typing
    env:
      VIRTUAL_ENV: "{{.ROOT_DIR}}/.venv"
    cmds:
      - cargo run -p ommx-pyo3-bridge-fixture --bin stub_gen
      - git diff --exit-code -- rust/ommx-pyo3-bridge/fixture/ommx_pyo3_bridge_fixture.pyi
      - uv run --no-sync pyright --project rust/ommx-pyo3-bridge/fixture/pyrightconfig.json

  pyo3-bridge:runtime-test:
    desc: Test conversion across independent PyO3 extension modules
    env:
      VIRTUAL_ENV: "{{.ROOT_DIR}}/.venv"
    cmds:
      - uvx --from "maturin>=1.12.2,<2" maturin develop --manifest-path rust/ommx-pyo3-bridge/fixture/Cargo.toml
      - uv run --no-sync pytest -vv rust/ommx-pyo3-bridge/fixture/tests/test_bridge.py

  pyo3-bridge:test:
    desc: Run all PyO3 bridge integration checks
    cmds:
      - task: pyo3-bridge:check
      - task: pyo3-bridge:runtime-test

  format:
    desc: Format all code
    cmds:
      - task: python:format
      - task: rust:format
      - task: proto:format
