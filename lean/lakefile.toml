name = "OMMXProof"
version = "0.1.0"
defaultTargets = ["OMMXProof"]
testDriver = "OMMXProofTest"

[[require]]
name = "mathlib"
git = "https://github.com/leanprover-community/mathlib4.git"
rev = "v4.31.0"

[[lean_lib]]
name = "OMMXProof"
globs = ["OMMXProof.*"]

[[lean_lib]]
name = "OMMXProofTest"
globs = ["OMMXProofTest.+"]
