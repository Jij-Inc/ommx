# .readthedocs.yaml
# Read the Docs configuration file
# See https://docs.readthedocs.io/en/stable/config-file/v2.html for details

version: 2
build:
  os: ubuntu-24.04
  tools:
    python: "3.12"
    nodejs: "22"
  commands:
    # Install jupyter-book only (no ommx packages needed since we skip execution)
    - pip install jupyter-book
    # Build without executing code cells (CI verifies code execution separately)
    - NB_EXECUTION_MODE=off jupyter-book build --path-output $READTHEDOCS_OUTPUT docs/en
