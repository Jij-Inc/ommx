# .readthedocs.yaml
# Read the Docs configuration file for Jupyter Book 2 (MyST)
# See https://mystmd.org/guide/deployment-readthedocs for details

version: 2
build:
  os: ubuntu-24.04
  tools:
    python: "3.11"
    nodejs: "22"
  commands:
    # Install dependencies
    - pip install -r requirements.txt
    # Build the site
    - cd docs/en && jupyter book build --html
    # Copy the output to Read the Docs expected location
    - mkdir -p $READTHEDOCS_OUTPUT/html/
    - cp -r docs/en/_build/html/. "$READTHEDOCS_OUTPUT/html"
