# .readthedocs.yaml
# Read the Docs configuration file
# See https://docs.readthedocs.io/en/stable/config-file/v2.html for details

version: 2
build:
  os: ubuntu-24.04
  tools:
    python: "3.12"
  commands:
    - pip install myst-nb sphinx-book-theme sphinx-autoapi sphinx-fontawesome sphinxcontrib-katex tomlkit
    - sphinx-build -b html docs/en $READTHEDOCS_OUTPUT/html
