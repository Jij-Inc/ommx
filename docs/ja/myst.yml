version: 1
project:
  title: OMMX
  github: Jij-Inc/ommx
  thebe:
    binder:
      repo: Jij-Inc/ommx
      provider: github
      url: https://mybinder.org
      ref: main
  exports:
    - format: pdf
      template: plain_latex_book
      output: exports/book.pdf
  toc:
    - file: introduction.md
    - title: Switch Language
      children:
        - url: https://jij-inc.github.io/ommx/en/
          title: English
    - title: AI Assistant
      children:
        - url: https://deepwiki.com/Jij-Inc/ommx
          title: DeepWiki
    - title: Tutorial
      children:
        - file: tutorial/solve_with_ommx_adapter.ipynb
        - file: tutorial/tsp_sampling_with_openjij_adapter.ipynb
        - file: tutorial/switching_adapters.ipynb
        - file: tutorial/share_in_ommx_artifact.ipynb
        - file: tutorial/download_miplib_instance.ipynb
        - file: tutorial/download_qplib_instance.ipynb
        - file: tutorial/implement_adapter.ipynb
    - title: User Guide
      children:
        - file: user_guide/supported_ommx_adapters.ipynb
        - file: user_guide/adapter_initial_state.ipynb
        - file: user_guide/function.ipynb
        - file: user_guide/instance.ipynb
        - file: user_guide/parametric_instance.ipynb
        - file: user_guide/solution.ipynb
        - file: user_guide/sample_set.ipynb
    - title: API Reference
      children:
        - url: https://jij-inc.github.io/ommx/protobuf.html
          title: OMMX Message Schema
        - url: https://jij-inc.github.io/ommx/rust/ommx/index.html
          title: OMMX Rust SDK
        - url: https://jij-inc.github.io/ommx/python/ommx/autoapi/index.html
          title: OMMX Python SDK
    - title: Release Note
      children:
        - file: release_note/ommx-2.0.0.md
        - file: release_note/ommx-1.9.0.ipynb
        - file: release_note/ommx-1.8.0.ipynb
        - file: release_note/ommx-1.7.0.ipynb
        - file: release_note/ommx-1.6.0.ipynb
        - file: release_note/ommx-1.5.0.ipynb
site:
  options:
    logo: ../logo.png
    analytics_google: GA4_TRACKING_ID
    folders: true
  template: book-theme
