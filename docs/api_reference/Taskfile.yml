# https://taskfile.dev
# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: "3"

tasks:
  default:
    desc: "Build and Open the API Reference of Python SDK"
    cmds:
      - task: build
      - task: open

  build:
    desc: "Build the API Reference of Python SDK"
    cmds:
      - uv run sphinx-build -b html . _build/html

  open:
    desc: "Open the API Reference of Python SDK"
    cmds:
      - uv run python -m webbrowser file:///$(pwd)/_build/html/index.html

  upgrade:
    desc: "Upgrade dependencies and export requirements.txt for Read the Docs"
    cmds:
      - uv sync --upgrade
      - uv export --format requirements-txt -o requirements.txt
