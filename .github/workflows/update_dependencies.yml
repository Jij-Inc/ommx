name: Update Dependencies

on:
  schedule:
    # Run weekly on Monday at 00:00 UTC
    - cron: "0 0 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  update-dependencies:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Environment
        uses: ./.github/actions/setup-test-environment

      - name: Upgrade Python dependencies
        run: uv sync --all-extras --upgrade

      - name: Upgrade docs dependencies
        run: task upgrade

      - name: Upgrade API reference dependencies
        run: task api_reference:upgrade

      - name: Create GitHub App Token
        uses: actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: ${{ secrets.TOKEN_PROVIDER_OMMX_APP_ID }}
          private-key: ${{ secrets.TOKEN_PROVIDER_OMMX_PRIVATE_KEY }}

      - name: Create Pull Request
        id: create-pr
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ steps.app-token.outputs.token }}
          commit-message: "chore(deps): update Python dependencies"
          title: "chore(deps): update Python dependencies"
          body: |
            This PR updates Python dependencies via `uv sync --upgrade`.

            ## Updated files
            - `uv.lock` (main Python workspace)
            - `docs/uv.lock` (Jupyter Book documentation)
            - `docs/api_reference/uv.lock` (API reference documentation)
            - `docs/requirements.txt` (Binder/Colab environment)
            - `docs/api_reference/requirements.txt` (Read the Docs)

            ---
            Auto-generated by [update_dependencies.yml](https://github.com/${{ github.repository }}/blob/main/.github/workflows/update_dependencies.yml)
          branch: deps/update-python-dependencies
          delete-branch: true
          labels: dependencies

      - name: Enable auto-merge
        if: steps.create-pr.outputs.pull-request-number
        run: gh pr merge --auto --squash "${{ steps.create-pr.outputs.pull-request-number }}"
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
