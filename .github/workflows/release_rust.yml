name: Release Rust SDK

on:
  push:
    tags:
      - rust-*
  workflow_dispatch:

permissions:
  contents: read

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      rust_version: ${{ steps.version.outputs.rust_version }}
      release_tag: rust-${{ steps.version.outputs.rust_version }}
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - id: version
        run: |
          rust_version="$(cargo metadata --no-deps --format-version=1 | jq -r '.packages[] | select(.name == "ommx") | .version')"
          echo "rust_version=${rust_version}" >> "$GITHUB_OUTPUT"
      - name: Check release tag
        if: github.ref_type == 'tag'
        run: |
          test "${GITHUB_REF_NAME}" = "rust-${{ steps.version.outputs.rust_version }}"

  cli_binaries:
    name: Build OMMX CLI (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    needs: version
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            archive: tgz
          - os: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
            archive: tgz
          - os: macos-14
            target: aarch64-apple-darwin
            archive: tgz
          - os: windows-2022
            target: x86_64-pc-windows-msvc
            archive: zip
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: release-cli-${{ matrix.target }}
      - name: Build CLI
        run: cargo build -p ommx --release --bin ommx --features cli --target ${{ matrix.target }}
      - name: Package CLI
        if: matrix.archive == 'tgz'
        run: |
          mkdir -p package dist
          cp "target/${{ matrix.target }}/release/ommx" package/ommx
          tar -C package -czf "dist/ommx-${{ matrix.target }}.tgz" ommx
      - name: Package CLI
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force package, dist | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/ommx.exe" "package/ommx.exe"
          Push-Location package
          Compress-Archive -Path "ommx.exe" -DestinationPath "../dist/ommx-${{ matrix.target }}.zip"
          Pop-Location
      - uses: actions/upload-artifact@v7
        with:
          name: ommx-${{ matrix.target }}
          path: dist/*

  # Manual dispatch stops after `cli_binaries`, leaving the archives as
  # workflow artifacts. Tag pushes publish the crates before attaching the
  # archives to the Rust SDK release.
  release_cli_binaries:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref_type == 'tag'
    needs:
      - version
      - cli_binaries
      - publish
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: ommx-*
          path: dist
          merge-multiple: true
      - uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.version.outputs.release_tag }}
          generate_release_notes: true
          files: dist/*

  publish:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref_type == 'tag'
    needs: cli_binaries
    permissions:
      contents: read
      id-token: write # Required for OIDC token exchange
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: rust-lang/crates-io-auth-action@v1
        id: auth
      # `ommx` depends on `ommx-derive` with a strict `=` version requirement,
      # so `ommx-derive` must appear on crates.io before `ommx` is published.
      - run: cargo publish -p ommx-derive
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
      - run: cargo publish -p ommx
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
      # The bridge has a strict dependency on the same-version `ommx` crate.
      - run: cargo publish -p ommx-pyo3-bridge
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

  next_version:
    runs-on: ubuntu-latest
    needs: release_cli_binaries
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-edit
        run: cargo install cargo-edit

      - name: Bump version
        run: |
          CURRENT_VERSION=$(cargo metadata --no-deps --format-version=1 | jq -r '.packages[] | select(.name == "ommx") | .version')
          if [[ "$CURRENT_VERSION" == *-* ]]; then
            PRERELEASE=${CURRENT_VERSION#*-}
            CHANNEL=${PRERELEASE%%.*}
            case "$CHANNEL" in
              alpha|beta|rc) ;;
              *) echo "Unsupported prerelease channel: $CHANNEL" >&2; exit 1 ;;
            esac
            cargo set-version --bump "$CHANNEL"
          else
            cargo set-version --bump patch
          fi
          echo "NEW_VERSION=$(cargo metadata --no-deps --format-version=1 | jq -r '.packages[] | select(.name == "ommx") | .version')" >> "$GITHUB_ENV"

      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ secrets.TOKEN_PROVIDER_OMMX_APP_ID }}
          private-key: ${{ secrets.TOKEN_PROVIDER_OMMX_PRIVATE_KEY }}

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ steps.app-token.outputs.token }}
          title: "Start developing ${{ env.NEW_VERSION }}"
          branch: "rust-version-update/${{ env.NEW_VERSION }}"
          base: "main"
