name: Release Rust SDK

on:
  push:
    tags:
      - rust-*
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # Required for OIDC token exchange
    steps:
      - uses: actions/checkout@v6
      - uses: rust-lang/crates-io-auth-action@v1
        id: auth
      - run: cargo publish -p ommx
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

  next_version:
    runs-on: ubuntu-latest
    needs: publish
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Determine base branch
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "branch" ]]; then
            BASE_BRANCH="${GITHUB_REF_NAME}"
          elif git merge-base --is-ancestor "${GITHUB_SHA}" origin/dev-2.x; then
            BASE_BRANCH="dev-2.x"
          else
            BASE_BRANCH="${{ github.event.repository.default_branch }}"
          fi

          echo "BASE_BRANCH=${BASE_BRANCH}" >> "$GITHUB_ENV"
          git checkout -B "${BASE_BRANCH}" "origin/${BASE_BRANCH}"

      - name: Install cargo-edit
        run: cargo install cargo-edit

      - name: Bump version
        run: |
          cargo set-version --bump patch
          echo "NEW_VERSION=$(cargo metadata --no-deps --format-version=1 | jq -r '.packages[0].version')" >> "$GITHUB_ENV"

      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ secrets.TOKEN_PROVIDER_OMMX_APP_ID }}
          private-key: ${{ secrets.TOKEN_PROVIDER_OMMX_PRIVATE_KEY }}

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ steps.app-token.outputs.token }}
          title: "Start developing ${{ env.NEW_VERSION }}"
          branch: "rust-version-update/${{ env.NEW_VERSION }}"
          base: ${{ env.BASE_BRANCH }}
