name: Rust

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Environment
        uses: ./.github/actions/setup-test-environment

      - name: Run cargo fmt
        run: cargo fmt --all -- --check

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Environment
        uses: ./.github/actions/setup-test-environment

      - uses: giraffate/clippy-action@v1
        with:
          reporter: "github-pr-check"
          github_token: ${{ github.token }}
          clippy_flags: -- -Dwarnings

  semver:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Check semver
        uses: obi1kenobi/cargo-semver-checks-action@v2

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Environment
        uses: ./.github/actions/setup-test-environment

      - name: Run tests
        run: cargo test

  test-with-registry:
    runs-on: ubuntu-latest
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Environment
        uses: ./.github/actions/setup-test-environment

      - name: Probe local registry
        run: curl -sf http://localhost:5000/v2/

      - name: Run remote-artifact tests against local registry
        run: cargo test -p ommx --features remote-artifact -- --include-ignored push_local_artifact_to

      - name: Verify pushed artifact lives in registry
        run: |
          set -eux
          curl -sf http://localhost:5000/v2/ommx-test/native-push/tags/list \
            | grep -F '"tag1"'
          curl -sf -H "Accept: application/vnd.oci.artifact.manifest.v1+json" \
            http://localhost:5000/v2/ommx-test/native-push/manifests/tag1 \
            | grep -F '"artifactType"'

  protogen:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Environment
        uses: ./.github/actions/setup-test-environment

      - name: Regenerate Rust codes from proto files
        run: cargo run --bin=protogen

      - name: Check updated
        run: |
          git diff --exit-code

  wasm-emscripten:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Environment
        uses: ./.github/actions/setup-test-environment
        with:
          setup-wasm: true

      - name: Check OMMX for wasm32-unknown-emscripten
        run: task rust:check:wasm32-emscripten
