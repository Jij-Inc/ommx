name: Rust

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Environment
        uses: ./.github/actions/setup-test-environment

      - name: Run cargo fmt
        run: cargo fmt --all -- --check

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Environment
        uses: ./.github/actions/setup-test-environment

      - uses: giraffate/clippy-action@v1
        with:
          reporter: "github-pr-check"
          github_token: ${{ github.token }}
          clippy_flags: --all-targets -- -Dwarnings

  semver:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Check semver
        uses: obi1kenobi/cargo-semver-checks-action@v2

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Environment
        uses: ./.github/actions/setup-test-environment

      - name: Run tests
        run: cargo test

  auth-e2e:
    # End-to-end coverage of the remote-artifact push pipeline and
    # the three-tier credential resolver in
    # `artifact::remote_transport::resolve_auth`. The test suite
    # (`rust/ommx/tests/auth_e2e.rs`) brings up its own ephemeral OCI
    # registries via `testcontainers` — anonymous, htpasswd-protected,
    # and one for the CLI dispatch test — so we do not need a GHA
    # `services:` declaration here. `ubuntu-latest` runners ship with
    # a running Docker daemon.
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Environment
        uses: ./.github/actions/setup-test-environment

      - name: Run auth e2e tests
        run: |
          cargo test -p ommx --features remote-artifact,built,cli --test auth_e2e \
            -- --include-ignored --test-threads=1

  protogen:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Environment
        uses: ./.github/actions/setup-test-environment

      - name: Regenerate Rust codes from proto files
        run: cargo run --bin=protogen

      - name: Check updated
        run: |
          git diff --exit-code

  wasm-emscripten:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Environment
        uses: ./.github/actions/setup-test-environment
        with:
          setup-wasm: true

      - name: Check OMMX for wasm32-unknown-emscripten
        run: task rust:check:wasm32-emscripten
