name: Rust

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Environment
        uses: ./.github/actions/setup-test-environment

      - name: Run cargo fmt
        run: cargo fmt --all -- --check

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Environment
        uses: ./.github/actions/setup-test-environment

      - uses: giraffate/clippy-action@v1
        with:
          reporter: "github-pr-check"
          github_token: ${{ github.token }}
          clippy_flags: -- -Dwarnings

  semver:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Check semver
        uses: obi1kenobi/cargo-semver-checks-action@v2

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Environment
        uses: ./.github/actions/setup-test-environment

      - name: Run tests
        run: cargo test

  test-with-registry:
    runs-on: ubuntu-latest
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Environment
        uses: ./.github/actions/setup-test-environment

      - name: Wait for local registry to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:5000/v2/; then
              echo "registry ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "registry not ready after 30s" >&2
          exit 1

      - name: Run remote-artifact tests against local registry
        run: cargo test -p ommx --features remote-artifact -- --include-ignored push_local_artifact_to

      - name: Verify pushed artifact lives in registry
        run: |
          set -eux
          curl -sf http://localhost:5000/v2/ommx-test/native-push/tags/list \
            | grep -F '"tag1"'
          curl -sf -H "Accept: application/vnd.oci.image.manifest.v1+json" \
            http://localhost:5000/v2/ommx-test/native-push/manifests/tag1 \
            | grep -F '"artifactType"'

      # The Rust smoke test above exercises `LocalArtifact::push()`
      # directly. This step covers the CLI entry point: `ommx push`
      # must dispatch through `LocalArtifact::try_open` + native
      # push for any image resident in the SQLite Local Registry,
      # not the legacy `Artifact::from_oci_dir` + ocipkg path.
      #
      # `ommx pull`'s stage-1 auto-migration materialises a legacy
      # disk OCI dir at `$OMMX_LOCAL_REGISTRY_ROOT/<host>/<repo>/<tag>`
      # alongside populating SQLite, so a regression that took the
      # legacy ocipkg push fallback would still find a usable disk
      # dir and pass silently. To make the test airtight we delete
      # everything under the registry root *except* `blobs/` and
      # `index.sqlite3` after the pull — that strips the legacy dirs
      # while leaving the SQLite registry intact, so the push can
      # only succeed via the new `LocalArtifact::push()` path.
      - name: Smoke-test ommx push CLI round-trip
        env:
          OMMX_LOCAL_REGISTRY_ROOT: /tmp/ommx-cli-registry
        run: |
          set -eux
          mkdir -p "$OMMX_LOCAL_REGISTRY_ROOT"
          cargo run --bin ommx --features remote-artifact,built,cli -- \
            pull localhost:5000/ommx-test/native-push:tag1
          # Strip the legacy OCI dirs so only the SQLite path is viable.
          find "$OMMX_LOCAL_REGISTRY_ROOT" -maxdepth 1 -mindepth 1 \
            -type d ! -name blobs -exec rm -rf {} +
          ls -la "$OMMX_LOCAL_REGISTRY_ROOT"
          cargo run --bin ommx --features remote-artifact,built,cli -- \
            push localhost:5000/ommx-test/native-push:tag1
          curl -sf http://localhost:5000/v2/ommx-test/native-push/manifests/tag1 \
            -H "Accept: application/vnd.oci.image.manifest.v1+json" \
            | grep -F '"artifactType"'

  protogen:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Environment
        uses: ./.github/actions/setup-test-environment

      - name: Regenerate Rust codes from proto files
        run: cargo run --bin=protogen

      - name: Check updated
        run: |
          git diff --exit-code

  wasm-emscripten:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Environment
        uses: ./.github/actions/setup-test-environment
        with:
          setup-wasm: true

      - name: Check OMMX for wasm32-unknown-emscripten
        run: task rust:check:wasm32-emscripten
