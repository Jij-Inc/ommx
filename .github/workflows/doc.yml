name: Documents

on:
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  sphinx:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        lang: [ja, en]
    env:
      python-version: 3.11
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Environment
        uses: ./.github/actions/setup-test-environment
        with:
          python-version: ${{ env.python-version }}

      - name: Sphinx Build
        run: |
          cd ./docs && \
          uv run --only-group dev sphinx-build -W -b html ${{ matrix.lang }} ${{ matrix.lang }}/_build/html

      - name: Upload HTML
        uses: actions/upload-artifact@v7
        with:
          name: doc-sphinx-${{ matrix.lang }}
          path: ./docs/${{ matrix.lang }}/_build/html
          retention-days: 30

  protobuf:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Environment
        uses: ./.github/actions/setup-test-environment

      - name: Generate API docs
        run: task proto:doc

      - name: Upload HTML
        uses: actions/upload-artifact@v7
        with:
          name: doc-protobuf
          path: ./proto/protobuf.html
          retention-days: 30

  rust:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Environment
        uses: ./.github/actions/setup-test-environment

      - name: Check warnings in documents
        uses: actions-rs/cargo@v1
        with:
          command: doc
          args: --no-deps
        env:
          RUSTDOCFLAGS: -D warnings

      - name: Upload HTML
        uses: actions/upload-artifact@v7
        with:
          name: doc-rust
          path: ./target/doc
          retention-days: 30

  package:
    needs: [sphinx, protobuf, rust]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Redirect HTML
        run: |
          mkdir doc
          mv docs/redirect/* doc/

      - name: Download HTML of Sphinx (ja)
        uses: actions/download-artifact@v8
        with:
          name: doc-sphinx-ja
          path: ./doc/ja

      - name: Download HTML of Sphinx (en)
        uses: actions/download-artifact@v8
        with:
          name: doc-sphinx-en
          path: ./doc/en

      - name: Download HTML of protobuf
        uses: actions/download-artifact@v8
        with:
          name: doc-protobuf
          path: ./doc

      - name: Download HTML of rust
        uses: actions/download-artifact@v8
        with:
          name: doc-rust
          path: ./doc/rust

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: doc
          path: doc
          retention-days: 30

  deploy:
    concurrency:
      group: "pages-deploy"
      cancel-in-progress: true
    needs: package
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Download HTML
        uses: actions/download-artifact@v8
        with:
          name: doc
          path: .

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
