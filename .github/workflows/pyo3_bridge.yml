name: PyO3 Bridge

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: pyo3-bridge (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Environment
        uses: ./.github/actions/setup-test-environment
        with:
          python-version: ${{ matrix.python-version }}

      - name: Prepare local Python SDK
        run: >-
          uv run ci-scripts/setup-python-test-project.py
          ${{ matrix.python-version }} --use_local_ommx

      - name: Install dependencies
        run: task python:sync

      - name: Check generated stubs and typing
        if: matrix.python-version == '3.10'
        run: task pyo3-bridge:check

      - name: Test cross-extension runtime
        run: task pyo3-bridge:runtime-test
